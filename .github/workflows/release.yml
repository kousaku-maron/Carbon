name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  build:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Developer ID cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_CERT_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_CERT_PASSPHRASE }}

      - name: Build Tauri app
        working-directory: app
        env:
          VITE_API_BASE_URL: https://carbon-backend.kousaku-maron.workers.dev
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app
            app/src-tauri/target/release/bundle/macos/*.tar.gz
            app/src-tauri/target/release/bundle/macos/*.sig

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: version
        run: echo "version=$(node -p "require('./app/src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Normalize updater artifact names
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          arm_pkg="$(find artifacts/macos-arm64 -type f -name "*.tar.gz" | head -n 1)"
          arm_sig_file="$(find artifacts/macos-arm64 -type f -name "*.sig" | head -n 1)"
          x64_pkg="$(find artifacts/macos-x64 -type f -name "*.tar.gz" | head -n 1)"
          x64_sig_file="$(find artifacts/macos-x64 -type f -name "*.sig" | head -n 1)"

          if [ ! -f "${arm_pkg}" ] || [ ! -f "${arm_sig_file}" ] || [ ! -f "${x64_pkg}" ] || [ ! -f "${x64_sig_file}" ]; then
            echo "missing updater artifacts"
            exit 1
          fi

          mkdir -p artifacts/updater
          arm_named="artifacts/updater/Carbon_${VERSION}_aarch64.app.tar.gz"
          x64_named="artifacts/updater/Carbon_${VERSION}_x64.app.tar.gz"
          cp "${arm_pkg}" "${arm_named}"
          cp "${arm_sig_file}" "${arm_named}.sig"
          cp "${x64_pkg}" "${x64_named}"
          cp "${x64_sig_file}" "${x64_named}.sig"

      - name: List artifacts
        run: find artifacts -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" -o -name "*.sig" \) | sort

      - name: Generate latest.json
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          arm_pkg="artifacts/updater/Carbon_${VERSION}_aarch64.app.tar.gz"
          arm_sig_file="${arm_pkg}.sig"
          x64_pkg="artifacts/updater/Carbon_${VERSION}_x64.app.tar.gz"
          x64_sig_file="${x64_pkg}.sig"

          if [ ! -f "${arm_pkg}" ] || [ ! -f "${arm_sig_file}" ] || [ ! -f "${x64_pkg}" ] || [ ! -f "${x64_sig_file}" ]; then
            echo "missing updater artifacts"
            exit 1
          fi

          arm_sig="$(cat "${arm_sig_file}")"
          x64_sig="$(cat "${x64_sig_file}")"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          base_url="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}"

          jq -n \
            --arg version "v${VERSION}" \
            --arg notes "See release notes on GitHub." \
            --arg pub_date "${pub_date}" \
            --arg arm_sig "${arm_sig}" \
            --arg arm_url "${base_url}/$(basename "${arm_pkg}")" \
            --arg x64_sig "${x64_sig}" \
            --arg x64_url "${base_url}/$(basename "${x64_pkg}")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $arm_sig,
                  url: $arm_url
                },
                "darwin-x86_64": {
                  signature: $x64_sig,
                  url: $x64_url
                }
              }
            }' > artifacts/latest.json

      - name: Show latest.json
        run: cat artifacts/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Carbon v${{ steps.version.outputs.version }}
          body: |
            ## Carbon v${{ steps.version.outputs.version }}

            ### What's New
            - Please update this section with actual changes

            ### Downloads

            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: Download the `arm64.dmg`
            - **Intel**: Download the `x64.dmg`

            ### Installation
            Download and open the DMG file, then drag Carbon to your Applications folder.
          files: |
            artifacts/macos-arm64/**/*.dmg
            artifacts/macos-x64/**/*.dmg
            artifacts/updater/*_aarch64.app.tar.gz
            artifacts/updater/*_aarch64.app.tar.gz.sig
            artifacts/updater/*_x64.app.tar.gz
            artifacts/updater/*_x64.app.tar.gz.sig
            artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
